<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMC Analyst</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f6f9;--bg2:#fff;--bg3:#f0f2f6;--border:#e2e6ed;--border2:#c8cdd8;--bull:#0a7a54;--bull-bg:#e8f6f0;--bull-b:#9ed4bc;--bear:#b83030;--bear-bg:#fdf0f0;--bear-b:#e8aaaa;--sweep:#c07010;--sweep-bg:#fef6e6;--weekly:#6030b0;--weekly-bg:#f0eafa;--neutral:#2060b0;--neutral-bg:#eaf2fc;--text:#1a2030;--text2:#5a6478;--text3:#9aa0b0;--near-bg:#fffbee;--near-b:#e8a820;--in-bg:#edfaf4;--in-b:#0a7a54;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;}
.header{background:var(--bg2);border-bottom:2px solid var(--border);padding:11px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.hdr-left{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.logo{font-weight:800;font-size:16px;}.logo span{color:var(--bull);}
.pair-selector{background:var(--bg2);border:2px solid var(--bull-b);color:var(--text);padding:6px 10px;border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;outline:none;cursor:pointer;min-width:120px;}
.mode-toggle{display:flex;background:var(--bg3);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.mode-btn{padding:6px 12px;border:none;background:transparent;cursor:pointer;font-size:11px;font-weight:600;color:var(--text2);transition:all .15s;}
.mode-btn.active{background:var(--text);color:#fff;}
.bias-bar{display:flex;align-items:center;gap:4px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:5px 10px;}
.bias-item{display:flex;align-items:center;gap:4px;padding:0 3px;}
.bias-tf{font-size:9px;font-weight:700;color:var(--text3);}
.bias-arrow{font-size:13px;font-weight:700;}
.bias-arrow.bull{color:var(--bull);}.bias-arrow.bear{color:var(--bear);}.bias-arrow.neutral{color:var(--text3);}
.bias-sep{width:1px;height:14px;background:var(--border);}
.price-bar{display:flex;align-items:center;gap:6px;}
.price-label{font-size:11px;font-weight:600;color:var(--text2);}
.price-input{border:2px solid var(--border2);background:var(--bg2);color:var(--bull);padding:5px 8px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;width:95px;outline:none;}
.date-disp{font-size:10px;color:var(--text3);}
.sync-indicator{font-size:10px;padding:3px 8px;border-radius:10px;font-weight:600;}
.sync-indicator.syncing{background:var(--sweep-bg);color:var(--sweep);}
.sync-indicator.synced{background:var(--bull-bg);color:var(--bull);}
.sync-indicator.error{background:var(--bear-bg);color:var(--bear);}
.btn{padding:7px 14px;border-radius:7px;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:5px;}
.btn-green{background:var(--bull);color:#fff;}.btn-green:hover{background:#096644;}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border2);}.btn-ghost:hover{border-color:var(--neutral);color:var(--neutral);}
.btn-red{background:transparent;color:var(--text3);border:1px solid var(--border);}.btn-red:hover{border-color:var(--bear);color:var(--bear);}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:5px;}
.btn-orange{background:var(--sweep);color:#fff;}.btn-orange:hover{background:#a06010;}
.main{max-width:1600px;margin:0 auto;padding:16px;}
.tf-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.tf-panel{background:var(--bg2);border-radius:12px;border:1px solid var(--border);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.tf-hdr{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.tf-panel.weekly .tf-hdr{background:var(--weekly-bg);}.tf-panel.daily .tf-hdr{background:var(--bear-bg);}.tf-panel.h4 .tf-hdr{background:var(--sweep-bg);}.tf-panel.h1 .tf-hdr{background:var(--neutral-bg);}
.tf-title{font-weight:700;font-size:13px;display:flex;align-items:center;gap:7px;}
.tf-badge{padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:1px;}
.weekly .tf-badge{background:var(--weekly-bg);color:var(--weekly);border:1px solid #c8a8f0;}
.daily .tf-badge{background:var(--bear-bg);color:var(--bear);border:1px solid var(--bear-b);}
.h4 .tf-badge{background:var(--sweep-bg);color:var(--sweep);border:1px solid #e8c060;}
.h1 .tf-badge{background:var(--neutral-bg);color:var(--neutral);border:1px solid #a0c0e8;}
.tf-body{padding:12px 14px;}
.bias-row{display:flex;gap:4px;}
.bias-btn{padding:3px 9px;border-radius:6px;border:1px solid var(--border2);background:var(--bg2);cursor:pointer;font-size:11px;font-weight:600;color:var(--text2);transition:all .12s;}
.bias-btn.bull.active{background:var(--bull-bg);border-color:var(--bull);color:var(--bull);}
.bias-btn.bear.active{background:var(--bear-bg);border-color:var(--bear);color:var(--bear);}
.bias-btn.neutral.active{background:var(--neutral-bg);border-color:var(--neutral);color:var(--neutral);}
.section{margin-bottom:14px;}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.sec-title{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;display:flex;align-items:center;gap:6px;}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border);margin-left:6px;}
.sec-count{font-size:10px;background:var(--bg3);color:var(--text2);padding:1px 7px;border-radius:10px;font-weight:600;}
.zone-list{display:flex;flex-direction:column;gap:4px;}
.zone-item{border:1px solid var(--border);border-radius:7px;overflow:hidden;transition:box-shadow .15s;}
.zone-item:hover{box-shadow:0 2px 8px rgba(0,0,0,.07);}
.zone-item.bull-ob{border-left:4px solid var(--bull);}.zone-item.bear-ob{border-left:4px solid var(--bear);}
.zone-item.bull-fvg{border-left:4px solid var(--bull);}.zone-item.bear-fvg{border-left:4px solid var(--bear);}
.zone-item.near{background:var(--near-bg);border-color:var(--near-b);}
.zone-item.inside{background:var(--in-bg);border-color:var(--in-b);}
.zone-row-compact{display:flex;align-items:center;gap:8px;padding:7px 10px;cursor:pointer;background:var(--bg2);user-select:none;flex-wrap:wrap;}
.zone-item.near .zone-row-compact{background:var(--near-bg);}.zone-item.inside .zone-row-compact{background:var(--in-bg);}
.zone-compact-type{font-size:10px;font-weight:700;min-width:64px;}
.zone-compact-label{font-weight:600;font-size:12px;flex:1;min-width:80px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.zone-compact-prices{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text2);white-space:nowrap;}
.zone-compact-dist{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;white-space:nowrap;min-width:58px;text-align:right;}
.zone-compact-status{min-width:58px;text-align:center;}
.zone-age{font-size:9px;color:var(--text3);white-space:nowrap;font-style:italic;}
.zone-age.fresh{color:var(--bull);}.zone-age.old{color:var(--text3);}.zone-age.ancient{color:var(--bear-b);}
.zone-chevron{color:var(--text3);font-size:10px;transition:transform .2s;flex-shrink:0;}
.zone-chevron.open{transform:rotate(90deg);}
.status-badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;}
.status-badge.active{background:var(--bull-bg);color:var(--bull);border:1px solid var(--bull-b);}
.status-badge.tested{background:var(--sweep-bg);color:var(--sweep);border:1px solid #e8c060;}
.status-badge.broken{background:#f4f4f4;color:#888;border:1px solid #ddd;text-decoration:line-through;}
.status-badge.breaker{background:var(--weekly-bg);color:var(--weekly);border:1px solid #c8a8f0;}
.status-badge.mitigated{background:#f4f4f4;color:#888;border:1px solid #ddd;text-decoration:line-through;}
.dist-badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;}
.dist-badge.above{background:var(--bear-bg);color:var(--bear);}.dist-badge.below{background:var(--bull-bg);color:var(--bull);}
.dist-badge.inside{background:var(--in-bg);color:var(--bull);border:1px solid var(--in-b);}
.dist-badge.near{background:var(--near-bg);color:var(--sweep);border:1px solid var(--near-b);}
.zone-expand{display:none;padding:10px 12px;border-top:1px solid var(--border);background:var(--bg3);}
.zone-expand.open{display:block;}
input,select,textarea{background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:6px 9px;border-radius:6px;font-family:'Inter',sans-serif;font-size:12px;outline:none;transition:border-color .15s;width:100%;}
input:focus,select:focus,textarea:focus{border-color:var(--neutral);}
select{cursor:pointer;}
.field-lbl{font-size:10px;font-weight:600;color:var(--text3);margin-bottom:3px;letter-spacing:.3px;}
.form-row{display:flex;gap:8px;align-items:flex-end;margin-bottom:8px;flex-wrap:wrap;}
.form-col{display:flex;flex-direction:column;}
.form-col.flex1{flex:1;min-width:80px;}.form-col.w60{width:60px;flex-shrink:0;}.form-col.w80{width:80px;flex-shrink:0;}.form-col.w100{width:100px;flex-shrink:0;}.form-col.w120{width:120px;flex-shrink:0;}.form-col.w140{width:140px;flex-shrink:0;}
.update-history{margin-top:8px;}
.update-entry{background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:6px 9px;margin-bottom:4px;}
.update-entry-date{font-size:10px;font-weight:600;color:var(--text3);margin-bottom:2px;}
.update-entry-text{font-size:12px;color:var(--text);}
.add-zone-form{background:var(--bg3);border:1px dashed var(--border2);border-radius:8px;padding:12px;margin-top:6px;display:none;}
.add-zone-form.open{display:block;}
.add-btn{background:transparent;border:1px dashed var(--border2);color:var(--text3);padding:6px;border-radius:7px;cursor:pointer;font-size:11px;font-weight:600;width:100%;transition:all .15s;margin-top:4px;text-align:center;}
.add-btn:hover{border-color:var(--bull);color:var(--bull);background:var(--bull-bg);}
.event-row{display:flex;gap:6px;align-items:center;padding:6px 9px;background:var(--bg2);border-radius:6px;border:1px solid var(--border);margin-bottom:4px;flex-wrap:wrap;}
.event-row.choch{border-left:3px solid var(--bear);}.event-row.bos{border-left:3px solid var(--bull);}
.event-row.sweep{border-left:3px solid var(--sweep);}.event-row.sfp{border-left:3px solid var(--neutral);}
.seq-preview{display:flex;flex-wrap:wrap;gap:3px;margin-top:7px;align-items:center;}
.seq-chip{padding:3px 7px;border-radius:4px;font-size:10px;font-weight:700;}
.seq-chip.choch{background:var(--bear-bg);color:var(--bear);border:1px solid var(--bear-b);}
.seq-chip.bos{background:var(--bull-bg);color:var(--bull);border:1px solid var(--bull-b);}
.seq-chip.sweep{background:var(--sweep-bg);color:var(--sweep);border:1px solid #e8c060;}
.seq-chip.sfp{background:var(--neutral-bg);color:var(--neutral);border:1px solid #a0c0e8;}
.seq-arrow{color:var(--text3);font-size:11px;}
.notes-area{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:7px 9px;border-radius:6px;font-size:12px;width:100%;resize:vertical;min-height:46px;outline:none;}
.notes-area:focus{border-color:var(--neutral);background:var(--bg2);}
.entry-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.entry-item{display:flex;flex-direction:column;gap:3px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.active{display:flex;}
.modal{background:var(--bg2);border-radius:12px;padding:22px;width:600px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);border:1px solid var(--border);}
.modal h3{font-size:15px;font-weight:700;margin-bottom:14px;}
.modal textarea{width:100%;height:180px;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:7px;font-family:'JetBrains Mono',monospace;font-size:11px;resize:vertical;outline:none;margin-bottom:12px;}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:12px;}
.toast{position:fixed;bottom:22px;right:22px;background:var(--text);color:#fff;padding:9px 16px;border-radius:8px;font-size:12px;font-weight:600;z-index:300;opacity:0;transform:translateY(8px);transition:all .2s;}
.toast.show{opacity:1;transform:translateY(0);}
/* EMPTY STATE */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;color:var(--text3);}
.empty-icon{font-size:48px;margin-bottom:16px;}
.empty-title{font-size:18px;font-weight:700;color:var(--text2);margin-bottom:8px;}
.empty-sub{font-size:13px;margin-bottom:24px;max-width:400px;line-height:1.6;}
/* ANALYSIS */
.analysis-page{max-width:1200px;margin:0 auto;padding:20px 16px;}
.analysis-day-nav{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:16px;}
.analysis-day-btn{padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);cursor:pointer;font-size:11px;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:5px;}
.analysis-day-btn.active{background:var(--text);color:#fff;border-color:var(--text);}
.analysis-day-btn.brief{border-left:3px solid var(--bull);}
.analysis-day-btn.debrief{border-left:3px solid var(--sweep);}
.analysis-type-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.5px;}
.analysis-type-badge.brief{background:var(--bull-bg);color:var(--bull);}
.analysis-type-badge.debrief{background:var(--sweep-bg);color:var(--sweep);}
.analysis-header{background:var(--bg2);border-radius:12px;border:1px solid var(--border);padding:20px 24px;margin-bottom:16px;}
.analysis-header-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:12px;}
.analysis-title{font-size:18px;font-weight:800;display:flex;align-items:center;gap:10px;}
.analysis-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.analysis-meta-badge{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;}
.session-note{background:var(--sweep-bg);border:1px solid #e8c060;border-radius:8px;padding:10px 14px;font-size:12px;color:var(--sweep);font-weight:500;}
.analysis-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;}
.analysis-card{background:var(--bg2);border-radius:12px;border:1px solid var(--border);padding:18px 20px;}
.analysis-card.full{grid-column:1/-1;}
.analysis-card-title{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.analysis-card-title::after{content:'';flex:1;height:1px;background:var(--border);}
.bias-table{width:100%;border-collapse:collapse;}
.bias-table th{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;padding:6px 10px;text-align:left;border-bottom:1px solid var(--border);}
.bias-table td{padding:8px 10px;border-bottom:1px solid var(--border);font-size:12px;}
.bias-table tr:last-child td{border-bottom:none;}
.bias-dir{font-weight:700;font-size:13px;}.bias-dir.bear{color:var(--bear);}.bias-dir.bull{color:var(--bull);}
.bias-conclusion{background:var(--bg3);border-radius:7px;padding:10px 14px;font-size:12px;color:var(--text);margin-top:10px;line-height:1.6;border-left:3px solid var(--bear);}
.levels-list{display:flex;flex-direction:column;gap:3px;}
.level-row{display:flex;align-items:center;gap:10px;padding:6px 10px;border-radius:6px;}
.level-row.resistance{background:rgba(184,48,48,.04);border-left:3px solid var(--bear);}
.level-row.support{background:rgba(10,122,84,.04);border-left:3px solid var(--bull);}
.level-row.current{background:var(--sweep-bg);border-left:3px solid var(--sweep);font-weight:700;}
.level-price{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;min-width:72px;}
.level-label{font-size:12px;flex:1;}
.level-tf{font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;}
.level-tf.daily{background:var(--bear-bg);color:var(--bear);}.level-tf.h4{background:var(--sweep-bg);color:var(--sweep);}
.level-tf.weekly{background:var(--weekly-bg);color:var(--weekly);}.level-tf.h1{background:var(--neutral-bg);color:var(--neutral);}
.setups-grid{display:flex;flex-direction:column;gap:10px;}
.setup-card{border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.setup-card.primary{border-left:4px solid var(--bull);}.setup-card.secondary{border-left:4px solid var(--sweep);}
.setup-card.optional{border-left:4px solid var(--neutral);}.setup-card.quality{border-left:4px solid var(--weekly);}
.setup-hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg3);cursor:pointer;user-select:none;}
.setup-id{font-size:10px;font-weight:800;padding:3px 8px;border-radius:4px;letter-spacing:.5px;}
.setup-id.dt{background:var(--neutral-bg);color:var(--neutral);border:1px solid #a0c0e8;}
.setup-id.sw{background:var(--weekly-bg);color:var(--weekly);border:1px solid #c8a8f0;}
.setup-title{font-weight:700;font-size:13px;flex:1;}
.setup-dir{font-weight:700;font-size:12px;padding:3px 10px;border-radius:12px;}
.setup-dir.short{background:var(--bear-bg);color:var(--bear);border:1px solid var(--bear-b);}
.setup-dir.long{background:var(--bull-bg);color:var(--bull);border:1px solid var(--bull-b);}
.setup-chevron{color:var(--text3);font-size:10px;transition:transform .2s;}.setup-chevron.open{transform:rotate(90deg);}
.setup-body{display:none;padding:14px 16px;border-top:1px solid var(--border);}.setup-body.open{display:block;}
.setup-logic{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:10px;padding:8px 12px;background:var(--bg3);border-radius:6px;}
.setup-params{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:10px;}
.setup-param{background:var(--bg3);border-radius:6px;padding:8px 10px;}
.setup-param-lbl{font-size:10px;font-weight:700;color:var(--text3);margin-bottom:3px;}
.setup-param-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--text);}
.setup-param-val.red{color:var(--bear);}.setup-param-val.green{color:var(--bull);}
.setup-targets{margin-bottom:10px;}
.target-row{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:6px;margin-bottom:4px;font-size:12px;}
.target-row.tp1{background:rgba(10,122,84,.05);}.target-row.tp2{background:rgba(10,122,84,.10);}.target-row.tp3{background:rgba(10,122,84,.15);}
.target-label{font-weight:700;min-width:36px;color:var(--bull);}
.target-price{font-family:'JetBrains Mono',monospace;font-weight:700;min-width:72px;}
.target-pips{color:var(--bull);font-weight:600;min-width:52px;}.target-rr{color:var(--text2);min-width:52px;}.target-size{color:var(--text3);font-size:11px;}
.setup-warning{background:var(--sweep-bg);border:1px solid #e8c060;border-radius:6px;padding:8px 12px;font-size:11px;color:var(--sweep);margin-bottom:8px;}
.setup-condition{font-size:11px;color:var(--text2);padding:8px 12px;background:var(--bg3);border-radius:6px;margin-bottom:8px;}.setup-condition strong{color:var(--text);}
.setup-management{font-size:11px;color:var(--text2);padding:8px 12px;background:var(--neutral-bg);border-radius:6px;border-left:3px solid var(--neutral);}
.add-to-journal-btn{margin-top:8px;width:100%;}
.avoid-list{list-style:none;}
.avoid-list li{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;}
.avoid-list li:last-child{border-bottom:none;}.avoid-list li::before{content:'✕';color:var(--bear);font-weight:700;flex-shrink:0;margin-top:1px;}
.scenario-row{display:flex;gap:12px;align-items:flex-start;padding:10px 12px;border-radius:8px;border:1px solid var(--border);margin-bottom:6px;}
.scenario-cond{flex:1;font-size:12px;font-weight:600;}.scenario-arrow{color:var(--text3);font-size:14px;flex-shrink:0;margin-top:2px;}.scenario-action{flex:1;font-size:12px;color:var(--text2);}
/* DEBRIEF */
.debrief-content{background:var(--bg2);border-radius:12px;border:1px solid var(--border);padding:24px;font-size:13px;line-height:1.8;}
.debrief-content h2{font-size:16px;font-weight:700;margin:20px 0 10px;color:var(--text);display:flex;align-items:center;gap:8px;}
.debrief-content h2:first-child{margin-top:0;}
.debrief-content h3{font-size:13px;font-weight:700;margin:14px 0 6px;color:var(--text2);}
.debrief-content p{color:var(--text2);margin-bottom:8px;}
.debrief-content ul{padding-left:20px;margin-bottom:8px;}
.debrief-content li{color:var(--text2);margin-bottom:4px;}
.debrief-content strong{color:var(--text);}
.debrief-content code{background:var(--bg3);padding:2px 6px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:11px;}
.debrief-content pre{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;margin:10px 0;overflow-x:auto;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.6;}
.debrief-content table{width:100%;border-collapse:collapse;margin:10px 0;}
.debrief-content th{background:var(--bg3);padding:8px 12px;text-align:left;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;border-bottom:2px solid var(--border);}
.debrief-content td{padding:8px 12px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2);}
.debrief-content tr:last-child td{border-bottom:none;}
.debrief-import-zone{border:2px dashed var(--border2);border-radius:12px;padding:50px 40px;text-align:center;color:var(--text3);}
/* ARCHIVE */
.archive-page{max-width:1200px;margin:0 auto;padding:20px 16px;}
.archive-zone-item{border:1px solid var(--border);border-radius:7px;overflow:hidden;margin-bottom:4px;opacity:.7;}
.archive-zone-item .zone-row-compact{background:var(--bg2);}
.mitigated-date{font-size:9px;color:var(--bear);font-weight:600;white-space:nowrap;}
/* JOURNAL */
.journal-page{max-width:1200px;margin:0 auto;padding:20px 16px;}
.journal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.journal-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-bottom:20px;}
.stat-card{background:var(--bg2);border-radius:10px;border:1px solid var(--border);padding:14px 16px;}
.stat-val{font-size:22px;font-weight:800;font-family:'JetBrains Mono',monospace;}
.stat-val.green{color:var(--bull);}.stat-val.red{color:var(--bear);}.stat-val.orange{color:var(--sweep);}
.stat-lbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:4px;}
.journal-table{width:100%;border-collapse:collapse;background:var(--bg2);border-radius:12px;overflow:hidden;border:1px solid var(--border);}
.journal-table th{background:var(--bg3);padding:10px 12px;text-align:left;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;border-bottom:1px solid var(--border);}
.journal-table td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle;}
.journal-table tr:last-child td{border-bottom:none;}
.journal-table tr:hover td{background:var(--bg3);}
.journal-result{font-weight:700;padding:2px 8px;border-radius:10px;font-size:11px;}
.journal-result.win{background:var(--bull-bg);color:var(--bull);}
.journal-result.loss{background:var(--bear-bg);color:var(--bear);}
.journal-result.be{background:var(--sweep-bg);color:var(--sweep);}
.journal-result.open{background:var(--neutral-bg);color:var(--neutral);}
.journal-result.skip{background:var(--bg3);color:var(--text3);}
.journal-dir{font-weight:700;font-size:11px;}
.journal-dir.short{color:var(--bear);}.journal-dir.long{color:var(--bull);}
.journal-pips{font-family:'JetBrains Mono',monospace;font-weight:700;}
.journal-pips.pos{color:var(--bull);}.journal-pips.neg{color:var(--bear);}
::-webkit-scrollbar{width:4px;height:4px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
@media(max-width:900px){.tf-grid,.analysis-grid{grid-template-columns:1fr;}.bias-bar{display:none;}.journal-stats{grid-template-columns:repeat(2,1fr);}}
</style>

<script>
var SUPABASE_URL='https://caenefhnwfyzhmneuyjb.supabase.co';
var SUPABASE_KEY='sb_publishable_0mIG5sSi6ueUNELew2G0iQ_7dozolX3';
var sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
var TFS=['weekly','daily','h4','h1'];
var PAIRS=['EURUSD','GBPUSD','USDJPY','USDCAD','AUDUSD','GBPJPY','AUDCHF','AUDNZD','XAUUSD','NAS100','GER40','EURAUD','GBPAUD','USDCHF'];
var TAGS_OB=['post-BOS','pre-sweep','1x tested','2x tested','fresh','news near','institutional'];
var TAGS_FVG=['post-BOS','impulse','1x tested','2x tested','fresh','news near'];
var NEAR=25;
var analysisImportType='brief';
var appMode='empty';
var currentPair='EURUSD';
var hasData=false;
var pairStates={};
PAIRS.forEach(function(p){pairStates[p]={current_price:'',weekly:emptyTF(),daily:emptyTF(),h4:emptyTFX('h4'),h1:emptyTFX('h1')};});
var state=pairStates['EURUSD'];
var allAnalyses=[];
var selectedAnalysis=null;
var allDebriefs=[];
var selectedDebrief=null;
var archivedZones=[];
var journalEntries=[];
var editingJournalId=null;

function emptyTF(){return{bias:'',obs:[],fvgs:[],events:[],notes:''}}
function emptyTFX(tf){var b=emptyTF();b.eqh='';b.eql='';if(tf==='h1'){b.entry='';b.sl='';b.tp1='';b.tp2='';b.direction='';}return b;}
function uid(){return'z'+Date.now()+Math.random().toString(36).slice(2,6);}
function zoneUid(pair,tf,ztype,dir,top,btm){var raw=pair+'_'+tf+'_'+ztype+'_'+dir+'_'+parseFloat(top||0).toFixed(5)+'_'+parseFloat(btm||0).toFixed(5);var h=0;for(var i=0;i<raw.length;i++){h=((h<<5)-h)+raw.charCodeAt(i);h|=0;}return'z'+Math.abs(h).toString(36)+raw.length.toString(36);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}
function closeModal(id){document.getElementById(id).classList.remove('active');}
function updateDate(){var n=new Date();document.getElementById('dateDisp').textContent=n.toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short'})+' '+n.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',hour12:false});}
updateDate();setInterval(updateDate,30000);
function zoneAge(fd,ft){if(!fd)return'';var f=new Date(fd+(ft?'T'+ft:'T00:00'));if(isNaN(f.getTime()))return'';var dH=Math.floor((new Date()-f)/36e5);var dD=Math.floor(dH/24);var cls=dD<7?'fresh':dD<30?'old':'ancient';var txt=dH<24?(dH+'h'):dD<7?(dD+'d'):Math.floor(dD/7)<8?(Math.floor(dD/7)+'w'):(Math.floor(dD/30)+'mo');return'<span class="zone-age '+cls+'">'+txt+' ago</span>';}
function setAnalysisType(t){analysisImportType=t;document.getElementById('aTypeBrief').className=t==='brief'?'btn btn-green btn-sm':'btn btn-ghost btn-sm';document.getElementById('aTypeDebrief').className=t==='debrief'?'btn btn-sm':'btn btn-ghost btn-sm';if(t==='debrief'){document.getElementById('aTypeDebrief').style.background='var(--sweep)';document.getElementById('aTypeDebrief').style.color='#fff';}else{document.getElementById('aTypeDebrief').style.background='';document.getElementById('aTypeDebrief').style.color='';}}
function setMode(m){appMode=m;['update','analysis','debrief','journal','archive'].forEach(function(n){var el=document.getElementById('mode'+n.charAt(0).toUpperCase()+n.slice(1)+'Btn');if(el)el.classList.toggle('active',n===m);});renderAll();}
function checkHasData(){var tot=0;TFS.forEach(function(tf){tot+=state[tf].obs.length+state[tf].fvgs.length+state[tf].events.length;});hasData=tot>0||allAnalyses.length>0||allDebriefs.length>0||journalEntries.length>0;document.getElementById('modeToggle').style.display=hasData?'flex':'none';if(!hasData)appMode='empty';}
function switchPair(p){currentPair=p;state=pairStates[p];selectedAnalysis=null;selectedDebrief=null;loadFromSupabase(p);}
function getPrice(){var v=parseFloat(document.getElementById('currentPrice').value);return isNaN(v)?null:v;}
function calcDist(top,btm){var price=getPrice();if(!price||!top||!btm)return null;var rTop=Math.max(+top,+btm),rBtm=Math.min(+top,+btm);if(price>=rBtm&&price<=rTop)return{type:'inside',pips:0};if(price>rTop)return{type:'below',pips:Math.round((price-rTop)*10000)};return{type:'above',pips:Math.round((rBtm-price)*10000)};}
function distHTML(top,btm){var d=calcDist(top,btm);if(!d)return'';if(d.type==='inside')return'<span class="dist-badge inside">● IN ZONE</span>';var cls=d.pips<=NEAR?'near':d.type;return'<span class="dist-badge '+cls+'">'+(d.type==='above'?'▲':'▼')+' '+d.pips+'p</span>';}
function zoneExCls(top,btm){var d=calcDist(top,btm);if(!d)return'';return d.type==='inside'?'inside':d.pips<=NEAR?'near':'';}
function refreshAllDist(){state.current_price=document.getElementById('currentPrice').value;schedulSync();renderAll();}
function setBias(tf,val){state[tf].bias=val;updateBiasBar();renderTF(tf);schedulSync();}
function updateBiasBar(){var map={bull:'↑',bear:'↓',neutral:'—','':'—'};var cls={bull:'bull',bear:'bear',neutral:'neutral','':'neutral'};TFS.forEach(function(tf){var el=document.getElementById('ba-'+tf);if(el){el.textContent=map[state[tf].bias]||'—';el.className='bias-arrow '+(cls[state[tf].bias]||'neutral');}});}

function renderAll(){var main=document.getElementById('mainContent');checkHasData();if(appMode==='empty'&&!hasData){main.innerHTML=renderEmpty();return;}if(appMode==='analysis'){main.innerHTML=renderAnalysisPage();return;}if(appMode==='debrief'){main.innerHTML=renderDebriefPage();return;}if(appMode==='journal'){main.innerHTML=renderJournalPage();return;}if(appMode==='archive'){main.innerHTML=renderArchivePage();return;}main.innerHTML='<div class="tf-grid">'+TFS.map(function(tf){return'<div id="panel-'+tf+'">'+renderTFHTML(tf)+'</div>';}).join('')+'</div>';updateBiasBar();}
function renderTF(tf){var el=document.getElementById('panel-'+tf);if(el)el.innerHTML=renderTFHTML(tf);updateBiasBar();}
function renderEmpty(){return'<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-title">SMC Analyst — '+currentPair+'</div><div class="empty-sub">Nicio data pentru aceasta pereche. Incepe prin a importa zone sau o analiza.</div><div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;"><button class="btn btn-green" onclick="openImport()">⬆ Import Zone JSON</button><button class="btn btn-ghost" onclick="openAnalysisModal()">☀ Import Brief</button><button class="btn btn-ghost" onclick="openDebriefModal()">🌙 Import Debrief</button></div></div>';}
function openImport(){document.getElementById('importModal').classList.add('active');}
function openAnalysisModal(){setAnalysisType('brief');document.getElementById('analysisImportModal').classList.add('active');}
function openDebriefModal(){document.getElementById('debriefImportModal').classList.add('active');}

function renderTFHTML(tf){
  var d=state[tf],names={weekly:'Weekly',daily:'Daily',h4:'4H',h1:'1H'};
  var biasOpts=['bull','bear','neutral'].map(function(v){var lbl=v==='bull'?'↑ Bull':v==='bear'?'↓ Bear':'— Range';return'<button class="bias-btn '+v+(d.bias===v?' active':'')+'" onclick="setBias(\''+tf+'\',\''+v+'\')">'+lbl+'</button>';}).join('');
  var eqHtml=(tf==='h4'||tf==='h1')?'<div class="section"><span class="sec-title">EQL / EQH</span><div class="entry-grid" style="margin-top:7px;"><div class="entry-item"><span class="field-lbl">EQH</span><input type="number" step="0.00001" value="'+(d.eqh||'')+'" onchange="state[\''+tf+'\'].eqh=this.value;schedulSync()"></div><div class="entry-item"><span class="field-lbl">EQL</span><input type="number" step="0.00001" value="'+(d.eql||'')+'" onchange="state[\''+tf+'\'].eql=this.value;schedulSync()"></div></div></div>':'';
  return'<div class="tf-panel '+tf+'"><div class="tf-hdr"><div class="tf-title"><span class="tf-badge">'+tf.toUpperCase()+'</span>'+names[tf]+'</div><div class="bias-row">'+biasOpts+'</div></div><div class="tf-body"><div class="section"><div class="sec-hdr"><span class="sec-title">Order Blocks <span class="sec-count">'+d.obs.length+'</span></span></div><div class="zone-list">'+d.obs.map(function(z){return renderZoneHTML(tf,'ob',z);}).join('')+'</div>'+renderAddBtn(tf,'ob')+'</div><div class="section"><div class="sec-hdr"><span class="sec-title">Fair Value Gaps <span class="sec-count">'+d.fvgs.length+'</span></span></div><div class="zone-list">'+d.fvgs.map(function(z){return renderZoneHTML(tf,'fvg',z);}).join('')+'</div>'+renderAddBtn(tf,'fvg')+'</div><div class="section"><div class="sec-hdr"><span class="sec-title">Sequence</span></div>'+d.events.map(function(ev){return renderEvHTML(tf,ev);}).join('')+'<button class="add-btn" onclick="addEvent(\''+tf+'\')">+ Add Event</button></div>'+eqHtml+'<div class="section"><span class="sec-title">Notes</span><textarea class="notes-area" style="margin-top:7px;" onchange="state[\''+tf+'\'].notes=this.value;schedulSync()" placeholder="Context...">'+esc(d.notes||'')+'</textarea></div></div></div>';}

function renderZoneHTML(tf,ztype,zone){if(!zone._id)zone._id=uid();var id=zone._id,isOB=ztype==='ob';var top=isOB?zone.top:zone.entry,btm=isOB?zone.btm:zone.exit;var ex=zoneExCls(top,btm);var cCls='zone-item '+zone.type+'-'+ztype+(ex?' '+ex:'');var lbl=zone.label||(isOB?'Unnamed OB':'Unnamed FVG');var stBadge='<span class="status-badge '+(zone.status||'active')+'">'+(zone.status||'active')+'</span>';
  return'<div class="'+cCls+'" id="zi-'+id+'"><div class="zone-row-compact" onclick="toggleZone(\''+id+'\')"><span class="zone-compact-type">'+(zone.type==='bull'?'🟢':'🔴')+' '+zone.type.toUpperCase()+' '+ztype.toUpperCase()+'</span><span class="zone-compact-label">'+esc(lbl)+'</span><span class="zone-compact-prices">'+parseFloat(top||0).toFixed(5)+' / '+parseFloat(btm||0).toFixed(5)+'</span><span class="zone-compact-dist">'+distHTML(top,btm)+'</span><span class="zone-compact-status">'+stBadge+'</span>'+zoneAge(zone.formed_date,zone.formed_time)+'<span class="zone-chevron" id="chv-'+id+'">▶</span></div><div class="zone-expand" id="ze-'+id+'">'+renderZoneExpand(tf,ztype,zone,id)+'</div></div>';}

function renderZoneExpand(tf,ztype,zone,id){var isOB=ztype==='ob';var top=isOB?zone.top:zone.entry,btm=isOB?zone.btm:zone.exit;var allSt=['active','tested','mitigated','broken','breaker'];var sOpts=allSt.map(function(s){return'<option value="'+s+'"'+(zone.status===s?' selected':'')+'>'+s.charAt(0).toUpperCase()+s.slice(1)+'</option>';}).join('');var hist=zone.update_history||[];

  '<div class="form-row"><div class="form-col flex1"><span class="field-lbl">LABEL</span><input type="text" value="'+esc(zone.label||'')+'" onchange="updateZF(\''+tf+'\',\''+ztype+'\',\''+id+'\',\'label\',this.value);schedulSync()"></div></div>'+
  '<div class="form-row"><div class="form-col w120"><span class="field-lbl">DATE FORMED</span><input type="date" value="'+(zone.formed_date||'')+'" onchange="updateZF(\''+tf+'\',\''+ztype+'\',\''+id+'\',\'formed_date\',this.value);schedulSync()"></div><div class="form-col w80"><span class="field-lbl">TIME</span><input type="time" value="'+(zone.formed_time||'')+'" onchange="updateZF(\''+tf+'\',\''+ztype+'\',\''+id+'\',\'formed_time\',this.value);schedulSync()"></div><div class="form-col flex1"><span class="field-lbl">CONTEXT</span><input type="text" value="'+esc(isOB?(zone.ob_note||''):(zone.fvg_note||''))+'" onchange="updateZF(\''+tf+'\',\''+ztype+'\',\''+id+'\',\''+(isOB?'ob_note':'fvg_note')+'\',this.value);schedulSync()"></div></div>'+
  (zone.mitigated_at?'<div style="font-size:10px;color:var(--bear);margin-bottom:6px;">Mitigated: '+zone.mitigated_at+'</div>':'')+
  '<div class="form-col flex1" style="margin-bottom:8px;"><span class="field-lbl">UPDATE NOTE</span><div style="display:flex;gap:6px;margin-top:3px;"><input type="text" id="upd-'+id+'" placeholder="Ce s-a schimbat..."><button class="btn btn-green btn-sm" onclick="saveNote(\''+tf+'\',\''+ztype+'\',\''+id+'\')">Save</button></div></div>'+
  (hist.length>0?'<div class="update-history"><span class="field-lbl">HISTORY</span>'+hist.slice().reverse().map(function(h){return'<div class="update-entry"><div class="update-entry-date">'+h.date+' '+h.time+'</div><div class="update-entry-text">'+esc(h.note)+'</div></div>';}).join('')+'</div>':'')+
  '<div style="display:flex;justify-content:flex-end;margin-top:8px;"><button class="btn btn-red btn-sm" onclick="removeZone(\''+tf+'\',\''+ztype+'\',\''+id+'\')">🗑 Delete</button></div>';}

function renderAddBtn(tf,ztype){return'<button class="add-btn" onclick="showAddForm(\''+tf+'\',\''+ztype+'\')">+ Add '+ztype.toUpperCase()+'</button><div class="add-zone-form" id="addform-'+tf+'-'+ztype+'"><div class="form-row"><div class="form-col w100"><span class="field-lbl">TYPE</span><select id="nf-type-'+tf+'-'+ztype+'"><option value="bear">🔴 Bear</option><option value="bull">🟢 Bull</option></select></div><div class="form-col w80"><span class="field-lbl">TOP</span><input type="number" step="0.00001" id="nf-top-'+tf+'-'+ztype+'"></div><div class="form-col w80"><span class="field-lbl">BOTTOM</span><input type="number" step="0.00001" id="nf-btm-'+tf+'-'+ztype+'"></div></div><div class="form-row"><div class="form-col flex1"><span class="field-lbl">LABEL</span><input type="text" id="nf-lbl-'+tf+'-'+ztype+'"></div></div><div class="form-row"><div class="form-col w120"><span class="field-lbl">DATE</span><input type="date" id="nf-date-'+tf+'-'+ztype+'"></div><div class="form-col w80"><span class="field-lbl">TIME</span><input type="time" id="nf-time-'+tf+'-'+ztype+'"></div></div><div style="display:flex;gap:6px;justify-content:flex-end;margin-top:6px;"><button class="btn btn-red btn-sm" onclick="hideAddForm(\''+tf+'\',\''+ztype+'\')">Cancel</button><button class="btn btn-green btn-sm" onclick="commitAdd(\''+tf+'\',\''+ztype+'\')">Add</button></div></div>';}

function renderEvHTML(tf,ev){if(!ev._id)ev._id=uid();var id=ev._id;var tOpts=['choch','bos','sweep','sfp'].map(function(t){return'<option value="'+t+'"'+(ev.type===t?' selected':'')+'>'+{choch:'CHoCH',bos:'BOS',sweep:'SWEEP',sfp:'SFP'}[t]+'</option>';}).join('');

function renderAnalysisContent(rec){var a=rec.data||rec;var bDirs={bull:'↑ BULL',bear:'↓ BEAR',neutral:'— RANGE'};
  var biasRows='';if(a.bias){biasRows=[{tf:'WEEKLY',d:a.bias.weekly},{tf:'DAILY',d:a.bias.daily},{tf:'H4',d:a.bias.h4}].map(function(r){if(!r.d)return'';return'<tr><td><b>'+r.tf+'</b></td><td><span class="bias-dir '+(r.d.direction||'')+'">'+( bDirs[r.d.direction]||'')+'</span></td><td style="color:var(--text2)">'+(r.d.summary||'')+'</td></tr>';}).join('');}
  var levelRows=(a.key_levels||[]).map(function(l){return'<div class="level-row '+l.type+'"><span class="level-price">'+l.price+'</span><span class="level-label">'+l.label+'</span>'+(l.tf?'<span class="level-tf '+l.tf+'">'+l.tf.toUpperCase()+'</span>':'')+'</div>';}).join('');
  function rSetup(s,pfx){var tgts=(s.targets||[]).map(function(t){return'<div class="target-row '+t.tp.toLowerCase()+'"><span class="target-label">'+t.tp+'</span><span class="target-price">'+t.price+'</span><span class="target-pips">'+t.pips+'p</span><span class="target-rr">'+t.rr+'</span><span class="target-size">'+t.size_pct+'%</span></div>';}).join('');
    return'<div class="setup-card '+(s.priority||'secondary')+'"><div class="setup-hdr" onclick="toggleSetup(\''+pfx+'-'+s.id+'\')"><span class="setup-id '+pfx+'">'+s.id+'</span><span class="setup-title">'+s.label+'</span><span class="setup-dir '+s.direction+'">'+(s.direction==='short'?'↓ SHORT':'↑ LONG')+'</span><span class="setup-chevron" id="schv-'+pfx+'-'+s.id+'">▶</span></div><div class="setup-body" id="sbody-'+pfx+'-'+s.id+'"><div class="setup-logic">'+(s.logic||'')+'</div><div class="setup-condition"><strong>Conditie:</strong> '+(s.condition||'')+'</div>'+(s.warning?'<div class="setup-warning">⚠ '+s.warning+'</div>':'')+'<div class="setup-params"><div class="setup-param"><div class="setup-param-lbl">ENTRY</div><div class="setup-param-val">'+s.entry+'</div></div><div class="setup-param"><div class="setup-param-lbl">SL</div><div class="setup-param-val red">'+s.sl+'</div></div><div class="setup-param"><div class="setup-param-lbl">RISC</div><div class="setup-param-val">'+s.risk_pips+'p</div></div>'+(s.session?'<div class="setup-param"><div class="setup-param-lbl">SESIUNE</div><div class="setup-param-val" style="font-size:10px">'+s.session+'</div></div>':'')+(s.duration?'<div class="setup-param"><div class="setup-param-lbl">DURATA</div><div class="setup-param-val">'+s.duration+'</div></div>':'')+'</div><div class="setup-targets">'+tgts+'</div>'+(s.management?'<div class="setup-management">📋 '+s.management+'</div>':'')+(s.invalidation?'<div class="setup-condition" style="margin-top:8px;border-left:3px solid var(--bear)"><strong>Invalidare:</strong> '+s.invalidation+'</div>':'')+
    '<button class="btn btn-ghost btn-sm add-to-journal-btn" onclick="addToJournal('+JSON.stringify(s).replace(/"/g,"'").replace(/'/g,"\\'").replace(/\\\\'([^']*)\\\\':/g,"'$1':")+')">📓 Adauga in Jurnal</button></div></div>';}
  var dtHTML=(a.day_trades||[]).map(function(s){return rSetup(s,'dt');}).join('');
  var swHTML=(a.swing_trades||[]).map(function(s){return rSetup(s,'sw');}).join('');
  var avoidHTML=(a.avoid||[]).map(function(x){return'<li>'+x+'</li>';}).join('');
  var scenHTML=(a.scenarios||[]).map(function(s){return'<div class="scenario-row"><span class="scenario-cond">'+s.condition+'</span><span class="scenario-arrow">→</span><span class="scenario-action">'+s.action+'</span></div>';}).join('');
  return'<div class="analysis-header"><div class="analysis-header-top"><div class="analysis-title"><span class="analysis-type-badge brief">☀ BRIEF</span>'+(a.pair||currentPair)+' — '+(a.day||'')+' '+(a.date||'')+'</div><div class="analysis-meta"><span class="analysis-meta-badge">📍 '+(a.current_price||'N/A')+'</span><button class="btn btn-red btn-sm" onclick="deleteAnalysis(\''+rec.id+'\',\'brief\')">🗑</button></div></div>'+(a.session_note?'<div class="session-note">⚠ '+a.session_note+'</div>':'')+'</div><div class="analysis-grid">'+(a.bias?'<div class="analysis-card"><div class="analysis-card-title">Bias</div><table class="bias-table"><tr><th>TF</th><th>Bias</th><th>Motiv</th></tr>'+biasRows+'</table><div class="bias-conclusion">'+(a.bias.conclusion||'')+'</div></div>':'')+(levelRows?'<div class="analysis-card"><div class="analysis-card-title">Nivele</div><div class="levels-list">'+levelRows+'</div></div>':'')+(a.critical_observation?'<div class="analysis-card full"><div class="analysis-card-title">⚠ Observatie critica</div><div class="setup-warning"><strong>'+a.critical_observation.title+'</strong><br>'+a.critical_observation.text+'</div></div>':'')+(dtHTML?'<div class="analysis-card"><div class="analysis-card-title">🎯 Day Trade</div><div class="setups-grid">'+dtHTML+'</div></div>':'')+(swHTML?'<div class="analysis-card"><div class="analysis-card-title">📈 Swing Trade</div><div class="setups-grid">'+swHTML+'</div></div>':'')+(avoidHTML?'<div class="analysis-card"><div class="analysis-card-title">✕ Evita</div><ul class="avoid-list">'+avoidHTML+'</ul></div>':'')+(scenHTML?'<div class="analysis-card"><div class="analysis-card-title">🔑 Scenarii</div>'+scenHTML+'</div>':'')+'</div>';}

function renderDebriefPage(){
  var nav='<div class="analysis-day-nav"><button class="btn btn-orange btn-sm" onclick="openDebriefModal()">+ Debrief</button>';
  allDebriefs.forEach(function(d,i){var cls=(selectedDebrief&&selectedDebrief.id===d.id)?'analysis-day-btn active debrief':'analysis-day-btn debrief';nav+='<button class="'+cls+'" onclick="selectDebrief('+i+')"><span class="analysis-type-badge debrief">🌙</span> '+d.date+'</button>';});
  nav+='</div>';
  if(!selectedDebrief){return'<div class="analysis-page">'+nav+'<div class="analysis-import-zone" style="border:2px dashed var(--border2);border-radius:12px;padding:50px;text-align:center;color:var(--text3);"><div style="font-size:36px;margin-bottom:12px;">🌙</div><div style="font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text2);">Niciun debrief</div><div style="font-size:12px;margin-bottom:20px;">Importa JSON-ul de debrief generat dupa analiza CSV-urilor</div><button class="btn btn-orange" onclick="openDebriefModal()">+ Import Debrief</button></div></div>';}
  var d=selectedDebrief;
  var html='<div class="analysis-page">'+nav;

  html+=renderDebriefContent(d.data);

function renderDebriefContent(data){
  if(!data)return'';
  // Render structured debrief JSON
  var html='<div class="analysis-grid">';
  // Sessions
  if(data.sessions){
    data.sessions.forEach(function(s){
      html+='<div class="analysis-card full"><div class="analysis-card-title">'+s.name+'</div>';
      html+='<div class="debrief-content"><p>'+esc(s.narrative||'')+'</p>';
      if(s.candles&&s.candles.length>0){html+='<pre>';s.candles.forEach(function(c){html+=c+'\n';});html+='</pre>';}
      html+='</div></div>';});
  }
  // Zones touched
  if(data.zones_touched&&data.zones_touched.length>0){
    html+='<div class="analysis-card full"><div class="analysis-card-title">📍 Zone Atinse — Calcul Trade</div><div class="debrief-content">';
    data.zones_touched.forEach(function(z){
      html+='<h3>'+esc(z.zone||'')+'</h3>';
      if(z.trade){html+='<table><tr><th>Entry</th><th>SL</th><th>TP1</th><th>TP2</th><th>Risk</th><th>Rezultat</th></tr><tr><td>'+z.trade.entry+'</td><td>'+z.trade.sl+'</td><td>'+(z.trade.tp1||'-')+'</td><td>'+(z.trade.tp2||'-')+'</td><td>'+(z.trade.risk_pips||'-')+'p</td><td><strong>'+esc(z.trade.result||'-')+'</strong></td></tr></table>';}
      if(z.notes)html+='<p>'+esc(z.notes)+'</p>';});
    html+='</div></div>';}
  // Predictions table
  if(data.predictions&&data.predictions.length>0){
    html+='<div class="analysis-card full"><div class="analysis-card-title">✅ Predictii vs Realitate</div><div class="debrief-content"><table><tr><th>Predictie</th><th>Realitate</th><th>Verdict</th></tr>';
    data.predictions.forEach(function(p){html+='<tr><td>'+esc(p.prediction)+'</td><td>'+esc(p.reality)+'</td><td><strong>'+(p.correct?'✅':'❌')+' '+esc(p.verdict||'')+'</strong></td></tr>';});
    html+='</table></div></div>';}
  // Tomorrow
  if(data.for_tomorrow){
    html+='<div class="analysis-card full"><div class="analysis-card-title">🔮 Ce inseamna pentru maine</div><div class="debrief-content">';
    if(Array.isArray(data.for_tomorrow)){data.for_tomorrow.forEach(function(t){html+='<p>'+esc(t)+'</p>';});}
    else{html+='<p>'+esc(data.for_tomorrow)+'</p>';}
    html+='</div></div>';}
  // Fallback: raw text
  if(!data.sessions&&!data.zones_touched&&!data.predictions){
    html+='<div class="analysis-card full"><div class="debrief-content"><pre style="white-space:pre-wrap;">'+esc(JSON.stringify(data,null,2))+'</pre></div></div>';}
  html+='</div>';
  return html;}

function selectDebrief(idx){selectedDebrief=allDebriefs[idx];renderAll();}

// ── JOURNAL PAGE ───────────────────────────────────────────
function renderJournalPage(){
  var wins=journalEntries.filter(function(e){return e.result&&e.result.startsWith('win');}).length;
  var losses=journalEntries.filter(function(e){return e.result==='loss';}).length;
  var bes=journalEntries.filter(function(e){return e.result==='be';}).length;
  var closed=wins+losses+bes;
  var wr=closed>0?Math.round(wins/closed*100):0;
  var totalPips=journalEntries.reduce(function(acc,e){return acc+(parseFloat(e.pips)||0);},0);
  var html='<div class="journal-page">';
  html+='<div class="journal-header"><h2 style="font-size:16px;font-weight:700;">📓 Jurnal Trades — '+currentPair+'</h2><button class="btn btn-green" onclick="openJournalModal()">+ Trade Nou</button></div>';
  html+='<div class="journal-stats">';
  html+='<div class="stat-card"><div class="stat-val">'+journalEntries.length+'</div><div class="stat-lbl">Total Trades</div></div>';
  html+='<div class="stat-card"><div class="stat-val green">'+wins+'</div><div class="stat-lbl">Wins</div></div>';
  html+='<div class="stat-card"><div class="stat-val red">'+losses+'</div><div class="stat-lbl">Losses</div></div>';
  html+='<div class="stat-card"><div class="stat-val orange">'+bes+'</div><div class="stat-lbl">Breakeven</div></div>';
  html+='<div class="stat-card"><div class="stat-val '+(wr>=50?'green':'red')+'">'+wr+'%</div><div class="stat-lbl">Winrate</div></div>';
  html+='<div class="stat-card"><div class="stat-val '+(totalPips>=0?'green':'red')+'">'+totalPips.toFixed(1)+'</div><div class="stat-lbl">Total Pips</div></div>';
  html+='</div>';
  if(journalEntries.length===0){html+='<div style="text-align:center;padding:60px;color:var(--text3);"><div style="font-size:36px;margin-bottom:12px;">📓</div><div style="font-size:15px;font-weight:700;margin-bottom:8px;color:var(--text2);">Niciun trade</div><div style="font-size:12px;margin-bottom:20px;">Adauga trades manual sau din brief-ul de analiza</div><button class="btn btn-green" onclick="openJournalModal()">+ Trade Nou</button></div>';}
  else{
    html+='<div style="overflow-x:auto;"><table class="journal-table"><thead><tr><th>Data</th><th>Sesiune</th><th>Dir</th><th>Setup</th><th>Zona</th><th>Entry</th><th>SL</th><th>TP1</th><th>Exit</th><th>Pips</th><th>R:R</th><th>Rezultat</th><th>Note</th><th></th></tr></thead><tbody>';
    journalEntries.slice().reverse().forEach(function(e){
      var rCls=e.result==='loss'?'loss':e.result==='be'?'be':e.result==='open'?'open':e.result==='skip'?'skip':'win';
      var rLabel={win:'Win TP1',win2:'Win TP2',win3:'Win TP3',be:'BE',loss:'Loss',open:'Open',skip:'Skip'}[e.result]||e.result||'-';
      var pipsCls=parseFloat(e.pips||0)>=0?'pos':'neg';
      html+='<tr><td>'+esc(e.date||'-')+'</td><td>'+esc(e.session||'-')+'</td><td><span class="journal-dir '+(e.direction||'')+'">'+({short:'↓ SHORT',long:'↑ LONG'}[e.direction]||'-')+'</span></td><td>'+esc(e.setup_id||'-')+'</td><td>'+esc(e.zone_label||'-')+'</td><td style="font-family:monospace">'+(e.entry_price||'-')+'</td><td style="font-family:monospace;color:var(--bear)">'+(e.sl_price||'-')+'</td><td style="font-family:monospace;color:var(--bull)">'+(e.tp1_price||'-')+'</td><td style="font-family:monospace">'+(e.exit_price||'-')+'</td><td><span class="journal-pips '+pipsCls+'">'+(e.pips!=null?(parseFloat(e.pips)>=0?'+':'')+parseFloat(e.pips).toFixed(1)+'p':'-')+'</span></td><td>'+(e.rr_achieved?'1:'+e.rr_achieved:'-')+'</td><td><span class="journal-result '+rCls+'">'+rLabel+'</span></td><td style="max-width:150px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="'+esc(e.notes||'')+'">'+esc(e.notes||'')+'</td><td style="white-space:nowrap;"><button class="btn btn-ghost btn-sm" onclick="editJournal(\''+e.id+'\')">✏</button> <button class="btn btn-red btn-sm" onclick="deleteJournal(\''+e.id+'\')">🗑</button></td></tr>';});
    html+='</tbody></table></div>';}
  html+='</div>';
  return html;}

function openJournalModal(setup){editingJournalId=null;document.getElementById('journalModalTitle').textContent='Adauga Trade in Jurnal';document.getElementById('jDate').value=new Date().toISOString().slice(0,10);document.getElementById('jSession').value='London';document.getElementById('jDir').value='short';document.getElementById('jSetup').value='';document.getElementById('jZone').value='';document.getElementById('jEntry').value='';document.getElementById('jSl').value='';document.getElementById('jTp1').value='';document.getElementById('jTp2').value='';document.getElementById('jTp3').value='';document.getElementById('jResult').value='open';document.getElementById('jExit').value='';document.getElementById('jPips').value='';document.getElementById('jRr').value='';document.getElementById('jNotes').value='';if(setup){document.getElementById('jDir').value=setup.direction||'short';document.getElementById('jSetup').value=setup.id+' — '+(setup.label||'');document.getElementById('jZone').value=setup.zone_label||'';document.getElementById('jEntry').value=(setup.entry||'').split('-')[0].trim();document.getElementById('jSl').value=setup.sl||'';if(setup.targets&&setup.targets[0])document.getElementById('jTp1').value=setup.targets[0].price||'';if(setup.targets&&setup.targets[1])document.getElementById('jTp2').value=setup.targets[1].price||'';if(setup.targets&&setup.targets[2])document.getElementById('jTp3').value=setup.targets[2].price||'';}document.getElementById('journalModal').classList.add('active');}

function addToJournal(setup){openJournalModal(setup);}

function editJournal(id){var e=journalEntries.find(function(j){return j.id===id;});if(!e)return;editingJournalId=id;document.getElementById('journalModalTitle').textContent='Editeaza Trade';document.getElementById('jDate').value=e.date||'';document.getElementById('jSession').value=e.session||'London';document.getElementById('jDir').value=e.direction||'short';document.getElementById('jSetup').value=e.setup_id||'';document.getElementById('jZone').value=e.zone_label||'';document.getElementById('jEntry').value=e.entry_price||'';document.getElementById('jSl').value=e.sl_price||'';document.getElementById('jTp1').value=e.tp1_price||'';document.getElementById('jTp2').value=e.tp2_price||'';document.getElementById('jTp3').value=e.tp3_price||'';document.getElementById('jResult').value=e.result||'open';document.getElementById('jExit').value=e.exit_price||'';document.getElementById('jPips').value=e.pips||'';document.getElementById('jRr').value=e.rr_achieved||'';document.getElementById('jNotes').value=e.notes||'';document.getElementById('journalModal').classList.add('active');}

async function saveJournalEntry(){
  var entry=parseFloat(document.getElementById('jEntry').value)||null;
  var sl=parseFloat(document.getElementById('jSl').value)||null;
  var exit=parseFloat(document.getElementById('jExit').value)||null;
  var pips=parseFloat(document.getElementById('jPips').value)||null;
  var rr=parseFloat(document.getElementById('jRr').value)||null;
  var dir=document.getElementById('jDir').value;
  // Auto-calc pips
  if(!pips&&entry&&exit){pips=d  if(!pips&&entry&&exit){pips=dir==='short'?Math.round((entry-exit)*10000)/10:Math.round((exit-entry)*10000)/10;}
  var tp1=parseFloat(document.getElementById('jTp1').value)||null;
  if(!rr&&entry&&sl&&tp1){var risk=Math.abs(entry-sl);var reward=Math.abs(tp1-entry);rr=risk>0?Math.round(reward/risk*10)/10:null;}
  var id=editingJournalId||('j_'+currentPair+'_'+Date.now());
  var obj={id:id,pair:currentPair,date:document.getElementById('jDate').value,session:document.getElementById('jSession').value,direction:dir,setup_id:document.getElementById('jSetup').value,zone_label:document.getElementById('jZone').value,entry_price:entry,sl_price:sl,tp1_price:tp1,tp2_price:parseFloat(document.getElementById('jTp2').value)||null,tp3_price:parseFloat(document.getElementById('jTp3').value)||null,result:document.getElementById('jResult').value,exit_price:exit,pips:pips,rr_achieved:rr,notes:document.getElementById('jNotes').value};
  await sb.from('smc_journal').upsert(obj,{onConflict:'id'});
  if(editingJournalId){var idx=journalEntries.findIndex(function(e){return e.id===editingJournalId;});if(idx>=0)journalEntries[idx]=obj;}else{journalEntries.push(obj);}
  closeModal('journalModal');renderAll();showToast('✓ Trade salvat');}

async function deleteJournal(id){if(!confirm('Sterge trade-ul?'))return;await sb.from('smc_journal').delete().eq('id',id);journalEntries=journalEntries.filter(function(e){return e.id!==id;});renderAll();showToast('✓ Trade sters');}

function renderArchivePage(){
  var html='<div class="archive-page"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;"><h2 style="font-size:16px;font-weight:700;">🗄 Arhiva Zone — '+currentPair+'</h2></div>';
  if(archivedZones.length===0){html+='<div style="text-align:center;padding:60px;color:var(--text3);"><div style="font-size:36px;margin-bottom:12px;">🗄</div><div style="font-size:15px;font-weight:700;color:var(--text2);">Nicio zona arhivata</div></div>';}
  else{html+='<div class="zone-list">';archivedZones.forEach(function(z){var top=z.top_price||0,btm=z.btm_price||0;html+='<div class="zone-item archive-zone-item '+(z.direction||'bear')+'-'+(z.zone_type||'ob')+'"><div class="zone-row-compact" onclick="toggleZone('arch-'+z.id+'')"><span class="zone-compact-type">'+(z.direction==='bull'?'🟢':'🔴')+' ['+(z.tf||'').toUpperCase()+'] '+(z.direction||'').toUpperCase()+' '+(z.zone_type||'').toUpperCase()+'</span><span class="zone-compact-label">'+esc(z.label||'')+'</span><span class="zone-compact-prices">'+parseFloat(btm).toFixed(5)+' / '+parseFloat(top).toFixed(5)+'</span><span class="zone-compact-status"><span class="status-badge '+(z.status||'mitigated')+'">'+( z.status||'mitigated')+'</span></span>'+(z.mitigated_at?'<span class="mitigated-date">'+z.mitigated_at+'</span>':'')+'<span class="zone-chevron" id="chv-arch-'+z.id+'">▶</span></div><div class="zone-expand" id="ze-arch-'+z.id+'"><div class="form-row"><div class="form-col w140"><span class="field-lbl">RESTAUREAZA CA</span><select onchange="restoreZone(''+z.id+'',this.value)"><option value="">-- selecteaza --</option><option value="active">↩ Active</option><option value="tested">↩ Tested</option></select></div></div><div style="font-size:11px;color:var(--text2);">'+esc(z.context_note||'No context')+'</div></div></div>';});html+='</div>';}
  html+='</div>';return html;}

async function restoreZone(zid,newStatus){if(!newStatus)return;await sb.from('smc_zones').update({status:newStatus,mitigated_at:null}).eq('id',zid);showToast('✓ Zona restaurata ca '+newStatus);loadFromSupabase(currentPair);}

loadFromSupabase(currentPair);
