<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SMC Analyst</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="hdr-left">
    <div class="logo">SMC <span>Analyst</span></div>
    <select class="pair-selector" onchange="switchPair(this.value)">
      <option>EURUSD</option><option>GBPUSD</option><option>USDJPY</option><option>USDCAD</option>
      <option>AUDUSD</option><option>GBPJPY</option><option>AUDCHF</option><option>AUDNZD</option>
      <option>XAUUSD</option><option>NAS100</option><option>GER40</option><option>EURAUD</option>
      <option>GBPAUD</option><option>USDCHF</option>
    </select>
    <div class="mode-toggle">
      <button class="mode-btn active" data-mode="zones" onclick="setMode('zones')">📋 Zones</button>
      <button class="mode-btn" data-mode="analysis" onclick="setMode('analysis')">📊 Analysis</button>
      <button class="mode-btn" data-mode="heartbeat" onclick="setMode('heartbeat')">🕯️ Heartbeat</button>
      <button class="mode-btn" data-mode="archive" onclick="setMode('archive')">🗄 Archive</button>
    </div>
    <div class="bias-bar">
      <div class="bias-item"><span class="bias-tf">W</span><span class="bias-arrow neutral" id="ba-weekly">—</span></div><div class="bias-sep"></div>
      <div class="bias-item"><span class="bias-tf">D</span><span class="bias-arrow neutral" id="ba-daily">—</span></div><div class="bias-sep"></div>
      <div class="bias-item"><span class="bias-tf">4H</span><span class="bias-arrow neutral" id="ba-h4">—</span></div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
    <div class="price-bar">
      <span class="price-label">PRICE</span>
      <span class="price-live"></span>
      <span class="price-val" id="priceDisplay">—</span>
      <span class="price-ago" id="priceAgo"></span>
    </div>
    <span class="date-disp" id="dateDisp"></span>
    <span class="sync-indicator" id="syncIndicator"></span>
    <button class="btn btn-ghost btn-sm" onclick="openImport()">⬆ Import</button>
    <button class="btn btn-ghost btn-sm" onclick="exportData()">⬇ Export</button>
    <button class="btn btn-green btn-sm" onclick="syncToSupabase()">⟳ Sync</button>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="mainContent"></div>

<!-- MODALS -->
<div class="modal-overlay" id="importModal">
  <div class="modal">
    <h3>⬆ Import Zones JSON</h3>
    <textarea id="importData" placeholder='Paste JSON...'></textarea>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" onclick="closeModal('importModal')">Cancel</button>
      <button class="btn btn-green btn-sm" onclick="doImport()">Import</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="analysisImportModal">
  <div class="modal">
    <h3 id="analysisImportLabel">⬆ Import Analysis JSON</h3>
    <input type="hidden" id="analysisImportType" value="brief">
    <textarea id="analysisImportData" placeholder='Paste JSON...'></textarea>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" onclick="closeModal('analysisImportModal')">Cancel</button>
      <button class="btn btn-green btn-sm" onclick="doAnalysisImport()">Import</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="tradeModal">
  <div class="modal">
    <h3>📝 Adauga Trade</h3>
    <div class="form-row">
      <div class="form-col w100"><span class="field-lbl">DIRECTIE</span><select id="tm-dir"><option value="long">↑ Long</option><option value="short">↓ Short</option></select></div>
      <div class="form-col w100"><span class="field-lbl">SETUP ID</span><input type="text" id="tm-setup" placeholder="DT-1"></div>
      <div class="form-col flex1"><span class="field-lbl">ZONA</span><input type="text" id="tm-zone" placeholder="H4 Bear OB"></div>
    </div>
    <div class="form-row">
      <div class="form-col w100"><span class="field-lbl">ENTRY</span><input type="number" step="0.00001" id="tm-entry"></div>
      <div class="form-col w100"><span class="field-lbl">SL</span><input type="number" step="0.00001" id="tm-sl"></div>
      <div class="form-col w100"><span class="field-lbl">TP1</span><input type="number" step="0.00001" id="tm-tp1"></div>
      <div class="form-col w100"><span class="field-lbl">TP2</span><input type="number" step="0.00001" id="tm-tp2"></div>
    </div>
    <div class="form-row">
      <div class="form-col w100"><span class="field-lbl">RESULT</span><select id="tm-result"><option value="">Pending</option><option value="TP1">TP1</option><option value="TP2">TP2</option><option value="TP3">TP3</option><option value="SL">SL</option><option value="BE">BE</option></select></div>
      <div class="form-col w80"><span class="field-lbl">EXIT</span><input type="number" step="0.00001" id="tm-exit"></div>
      <div class="form-col w80"><span class="field-lbl">PIPS</span><input type="number" step="0.1" id="tm-pips"></div>
      <div class="form-col w80"><span class="field-lbl">R:R</span><input type="number" step="0.1" id="tm-rr"></div>
      <div class="form-col w100"><span class="field-lbl">SESIUNE</span><select id="tm-session"><option value="London">London</option><option value="NY">New York</option><option value="Asian">Asian</option><option value="Overlap">Overlap</option></select></div>
    </div>
    <div class="form-row"><div class="form-col flex1"><span class="field-lbl">NOTE</span><textarea id="tm-notes" rows="2" placeholder="Ce ai observat..."></textarea></div></div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" onclick="closeModal('tradeModal')">Cancel</button>
      <button class="btn btn-green btn-sm" onclick="saveTrade()">💾 Save Trade</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/price.js"></script>
<script src="js/zones.js"></script>
<script src="js/analysis.js"></script>
<script src="js/sync.js"></script>
<script src="js/import-export.js"></script>
<script src="js/heartbeat.js"></script>
<script src="js/app.js"></script>

</body>
</html>
